<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    :root { --mark: #2f8a93; --mark-alt: #1d1d1d; }
    @media (prefers-color-scheme: dark) { :root { --mark-alt: #f5f5f5; } }
  </style>
  <!-- Rounded square backdrop so the mark has a stable shape at 16×16 across tab UIs -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="var(--mark)"/>
  <!-- Two overlapping circles — sender & receiver (inverted for contrast on the teal) -->
  <circle cx="11" cy="16" r="7" fill="none" stroke="#ffffff" stroke-width="2.2" opacity="0.95"/>
  <circle cx="21" cy="16" r="7" fill="none" stroke="#ffffff" stroke-width="2.2" opacity="0.6"/>
  <!-- Forward chevron — payment flow -->
  <path d="M15 12.8 L19 16 L15 19.2"
        fill="none" stroke="#ffffff" stroke-width="2.4"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
